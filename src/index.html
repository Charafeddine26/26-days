<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>26DaysApp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
  <!-- Noise Filters -->
  <svg width="0" height="0" style="position:absolute; width:0; height:0; pointer-events:none;">
    <filter id="noise-void">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" />
    </filter>
    <filter id="noise-deep">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" stitchTiles="stitch" />
    </filter>
    <filter id="noise-mid">
      <feTurbulence type="fractalNoise" baseFrequency="0.45" numOctaves="3" stitchTiles="stitch" />
    </filter>
    <filter id="noise-surface">
      <feTurbulence type="fractalNoise" baseFrequency="0.35" numOctaves="2" stitchTiles="stitch" />
    </filter>
  </svg>

  <app-root></app-root>
  <div class="vignette-overlay"></div>
</body>
</html>
